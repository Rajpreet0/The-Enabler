services:
  backend:
    build: ./backend
    volumes:
      - ./backend:/code 
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/code
      - PYTHONDONTWRITEBYTECODE=1 
      - PYTHONUNBUFFERED=1       
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /code

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app          
      - /app/node_modules        
      - /app/.next              
    ports:
      - "3000:3000"
    environment:
      - WATCHPACK_POLLING=true   